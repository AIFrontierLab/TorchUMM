train:
  pipeline: bagel
  cwd: src/umm/post_training/sft/bagel/Bagel
  entrypoint: torchrun
  script: train/pretrain_unified_navit.py
  env:
    PYTHONPATH: .
    WANDB_PROJECT: bagel-finetune
  torchrun:
    nnodes: 1
    node_rank: 0
    nproc_per_node: 4
    master_addr: 127.0.0.1
    master_port: 29501
  args:
    dataset_config_file: ./data/configs/example.yaml
    model_path: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    wandb_project: bagel-finetune
    layer_module: Qwen2MoTDecoderLayer
    max_latent_size: 64
    resume-from: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    finetune_from_hf: True
    auto_resume: True
    resume-model-only: True
    finetune-from-ema: True
    log_every: 1
    lr: 2e-5
    num_workers: 1
    num_replicate: 1
    num_shard: 4
    save_every: 1000
    results_dir: ./results/checkpoint/
    expected_num_tokens: 10240
    max_num_tokens: 11520
    max_num_tokens_per_sample: 10240
