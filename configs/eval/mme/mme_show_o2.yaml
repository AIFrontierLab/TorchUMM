eval:
  benchmark: mme

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    version: 2
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-7B
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 100
      top_k: 1
      temperature: 0.8
      use_clip_vit: true
  request:
    task: understanding
    params:
      max_new_tokens: 20

mme:
  root: src/umm/eval/internvl_chat/eval/mme/Your_Results
  image_root: data/mme/MME_Benchmark_release_version
  out_dir: output/mme/show_o2
  score_output_path: output/mme/show_o2/summary.json
  run_calculation: true

