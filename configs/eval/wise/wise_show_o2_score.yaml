eval:
  benchmark: wise

wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/show_o2
  max_samples: 0
  resume: true
  score_output_path: output/wise/show_o2/summary.json
  mode: score  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: show-o2
  backbone_cfg: {}
  request:
    params:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
