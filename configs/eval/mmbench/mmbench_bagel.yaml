eval:
  benchmark: mmbench

inference:
  backbone: bagel
  backbone_cfg:
    bagel_root: ${UMM_CODEBASE}/src/umm/backbones/bagel/Bagel
    model_path: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    max_mem_per_gpu: 80GiB
    offload_folder: ./tmp/offload
    seed: 42

    understanding_cfg:
      max_think_token_n: 1000
      do_sample: false

mmbench:
  datasets: [MMBench_TEST_EN_V11, MMBench_TEST_CN_V11]
  dataset_paths:
    MMBench_TEST_EN_V11: ${UMM_DATASETS}/mmbench/MMBench_TEST_EN_V11.tsv
    MMBench_TEST_CN_V11: ${UMM_DATASETS}/mmbench/MMBench_TEST_CN_V11.tsv
  out_dir: output/mmbench/bagel
  score_output_path: output/mmbench/bagel/summary.json
  mode: generate
  resume: true
  llm_extract:
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 64
