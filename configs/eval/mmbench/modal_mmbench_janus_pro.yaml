eval:
  benchmark: mmbench

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: /model_cache/janus_pro/Janus-Pro-7B
    janus_root: /workspace/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_cache: true

mmbench:
  datasets: [MMBench_TEST_EN_V11, MMBench_TEST_CN_V11]
  out_dir: /outputs/mmbench/janus_pro
  score_output_path: /outputs/mmbench/janus_pro/summary.json
  resume: true
  mode: full
  score_model: wise
  score_gpu: "A100-80GB"
  llm_extract:
    model_path: /model_cache/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 64
