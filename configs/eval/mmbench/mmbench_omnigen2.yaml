eval:
  benchmark: mmbench

inference:
  backbone: omnigen2
  backbone_cfg:
    omnigen2_root: ${UMM_CODEBASE}/model/OmniGen2
    model_path: ${UMM_MODEL_CACHE}/omnigen2/OmniGen2
    device: cuda:0
    device_map: cuda:0
    torch_dtype: bfloat16
    enable_cpu_offload: false
    enable_sequential_cpu_offload: false
    generation_cfg:
      num_inference_steps: 50
      seed: 42

    understanding_cfg:
      max_new_tokens: 2048

mmbench:
  datasets: [MMBench_TEST_EN_V11, MMBench_TEST_CN_V11]
  dataset_paths:
    MMBench_TEST_EN_V11: ${UMM_DATASETS}/mmbench/MMBench_TEST_EN_V11.tsv
    MMBench_TEST_CN_V11: ${UMM_DATASETS}/mmbench/MMBench_TEST_CN_V11.tsv
  out_dir: output/mmbench/omnigen2
  score_output_path: output/mmbench/omnigen2/summary.json
  mode: generate
  resume: true
  llm_extract:
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 64
