eval:
  benchmark: mmbench

inference:
  backbone: mmada
  backbone_cfg:
    model_path: /model_cache/mmada/MMaDA-8B-Base
    mmada_root: /workspace/model/MMaDA
    vq_model_path: /model_cache/mmada/magvitv2
    seed: 42

    understanding_cfg:
      max_new_tokens: 2048
      steps: 256
      block_length: 128

mmbench:
  datasets: [MMBench_TEST_EN_V11, MMBench_TEST_CN_V11]
  out_dir: /outputs/mmbench/mmada
  score_output_path: /outputs/mmbench/mmada/summary.json
  mode: score
  resume: true
  score_model: wise
  score_gpu: "A100-80GB"
  llm_extract:
    model_path: /model_cache/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 64
