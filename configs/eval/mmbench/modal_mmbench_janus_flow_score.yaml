eval:
  benchmark: mmbench

inference:
  backbone: janus_flow
  backbone_cfg:
    model_path: /model_cache/janus_flow/JanusFlow-1.3B
    janus_root: /workspace/src/umm/backbones/janus_flow/Janus
    vae_path: /model_cache/janus_flow/sdxl-vae
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_cache: true

mmbench:
  datasets: [MMBench_TEST_EN_V11, MMBench_TEST_CN_V11]
  out_dir: /outputs/mmbench/janus_flow
  score_output_path: /outputs/mmbench/janus_flow/summary.json
  resume: true
  mode: score
  score_model: wise
  score_gpu: "A100-80GB"
  llm_extract:
    model_path: /model_cache/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 64
