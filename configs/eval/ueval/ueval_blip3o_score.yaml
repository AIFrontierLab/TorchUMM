eval:
  benchmark: ueval

inference:
  backbone: blip3o
  backbone_cfg: {}
  request:
    params: {}

ueval:
  mode: score
  hf_dataset: primerL/UEval-all
  domains: all
  out_dir: output/ueval/blip3o
  max_samples: 0
  resume: true
  score_output_path: output/ueval/blip3o/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
