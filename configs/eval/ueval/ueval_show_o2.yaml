eval:
  benchmark: ueval

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-7B
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    version: 2
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 100
      top_k: 1
      temperature: 0.8
      use_clip_vit: true
  request:
    params:
      max_new_tokens: 512
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1

ueval:
  mode: full
  hf_dataset: primerL/UEval-all
  domains: all
  out_dir: output/ueval/show_o2
  max_samples: 0
  resume: true
  score_output_path: output/ueval/show_o2/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
