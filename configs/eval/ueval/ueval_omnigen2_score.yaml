eval:
  benchmark: ueval

inference:
  backbone: omnigen2
  backbone_cfg: {}
  request:
    params:
      max_new_tokens: 512
      num_inference_steps: 50
      text_guidance_scale: 4.0

ueval:
  mode: score
  hf_dataset: primerL/UEval-all
  domains: all
  out_dir: output/ueval/omnigen2
  max_samples: 0
  resume: true
  score_output_path: output/ueval/omnigen2/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
