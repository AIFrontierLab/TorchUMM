eval:
  benchmark: ueval

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/ovis_u1/Ovis-U1-3B
    generation_cfg:
      height: 1024
      width: 1024
      num_steps: 50
      txt_cfg: 5.0
    understanding_cfg:
      max_new_tokens: 4096
      do_sample: false
  request:
    params: {}

ueval:
  mode: generate
  hf_dataset: primerL/UEval-all
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/ovis_u1
  max_samples: 0
  resume: true
  score_output_path: output/ueval/ovis_u1/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
