eval:
  benchmark: ueval

inference:
  backbone: tokenflow
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/tokenflow/TokenFlow-t2i
    tokenizer_path: ${UMM_MODEL_CACHE}/tokenflow/TokenFlow/tokenflow_clipb_32k_enhanced.pt
    tokenflow_root: ${UMM_CODEBASE}/model/TokenFlow
    cfg: 7.5
    loop: 1
    mixed_precision: bf16
    batch_size: 1
  request:
    params: {}

ueval:
  mode: full
  hf_dataset: primerL/UEval-all
  domains: all
  out_dir: output/ueval/tokenflow
  max_samples: 0
  resume: true
  score_output_path: output/ueval/tokenflow/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
