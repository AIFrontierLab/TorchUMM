eval:
  benchmark: ueval

inference:
  backbone: blip3o
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/blip3o/BLIP3o-NEXT-SFT-3B
    blip3o_root: ${UMM_CODEBASE}/model/BLIP3o
    device: "cuda:0"
    torch_dtype: bfloat16
    scale: 0
    seq_len: 729
    top_p: 0.95
    top_k: 1200
  request:
    params: {}

ueval:
  mode: generate
  hf_dataset: primerL/UEval-all
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/blip3o
  max_samples: 0
  resume: true
  score_output_path: output/ueval/blip3o/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
