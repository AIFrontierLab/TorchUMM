eval:
  benchmark: ueval

inference:
  backbone: show_o2
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-1.5B
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    version: 2
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 100
      top_k: 1
      temperature: 0.8
      use_clip_vit: true
  request:
    params:
      max_new_tokens: 512
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1

ueval:
  mode: generate
  hf_dataset: primerL/UEval-all
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/show_o2_1_5b
  max_samples: 0
  resume: true
  score_output_path: output/ueval/show_o2_1_5b/eval_results.json
