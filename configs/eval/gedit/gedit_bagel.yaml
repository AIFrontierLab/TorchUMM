eval:
  benchmark: gedit

gedit:
  data_root: /datasets/gedit/GEdit-Bench
  out_dir: /outputs/gedit/bagel
  mode: full  # full | generate | score
  resume: true
  model_name: bagel
  score_model: wise  # VLM scoring runs in wise image (has transformers + qwen_vl_utils)
  instruction_language: all  # all | en | cn
  task_type: all
  run_calculate: true
  score_output_path: /outputs/gedit/bagel/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct

inference:
  backbone: bagel
  backbone_cfg:
    model_path: /model_cache/bagel/BAGEL-7B-MoT
    bagel_root: /workspace/model/Bagel
    max_mem_per_gpu: "80GiB"
    offload_folder: ./tmp/offload
    seed: 42
    editing_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      num_timesteps: 50
  request:
    params: {}
