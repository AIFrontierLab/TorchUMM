eval:
  benchmark: uni_mmmu

inference:
  backbone: bagel
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    bagel_root: ${UMM_CODEBASE}/model/Bagel
    offload_folder: ./tmp/offload_bagel0
    max_mem_per_gpu: "80GiB"
    seed: 42
    generation_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      num_timesteps: 50
    editing_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      num_timesteps: 50
    understanding_cfg:
      max_think_token_n: 1000
      do_sample: false
  request:
    params: {}

uni_mmmu:
  data_root: ${UMM_DATASETS}/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science]
  out_dir: output/uni_mmmu/bagel
  max_samples: 0
  resume: true
  mode: generate  # generate | score | full
  score_output_path: output/uni_mmmu/bagel/overall_summary.json
  scoring:
    eval_dir: output/uni_mmmu/bagel/eval
    vl_model: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    text_lm_model: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B
    max_retries: 2
    max_eval_items: 0  # 0 = all
    evaluate_images: true
    maze_parser:
      grid_h: 6
      grid_w: 6
      tolerance: 0.75
    sliding_parser:
      grid_h: 3
      grid_w: 3
      num_categories: 9
      tolerance: 0.80
