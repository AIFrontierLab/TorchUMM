eval:
  benchmark: uni_mmmu

inference:
  backbone: show-o2
  backbone_cfg: {}
  request:
    params:
      max_new_tokens: 512
      guidance_scale: 3.0
      generation_timesteps: 50

uni_mmmu:
  data_root: ${UMM_DATASETS}/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science, math_geo, code_rendering]  # no editing support; jigsaw/maze/sliding excluded
  out_dir: output/uni_mmmu/show_o2
  max_samples: 0                        # 0 = all tasks
  resume: true
  mode: score  # full | generate | score
  score_output_path: output/uni_mmmu/show_o2/overall_summary.json
  scoring:
    dreamsim_cache: ${UMM_MODEL_CACHE}/dreamsim

