eval:
  benchmark: uni_mmmu

inference:
  backbone: ovis_u1
  backbone_cfg: {}
  request:
    params: {}

uni_mmmu:
  data_root: ${UMM_DATASETS}/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science, math_geo, code_rendering]
  out_dir: output/uni_mmmu/ovis_u1
  max_samples: 0
  resume: true
  mode: score  # generate | score | full
  score_output_path: output/uni_mmmu/ovis_u1/overall_summary.json
  scoring:
    eval_dir: output/uni_mmmu/ovis_u1/eval
    vl_model: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    text_lm_model: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B
    dreamsim_cache: ${UMM_MODEL_CACHE}/dreamsim
    max_retries: 2
    max_eval_items: 0  # 0 = all
    evaluate_images: true
    maze_parser:
      grid_h: 6
      grid_w: 6
      tolerance: 0.75
    sliding_parser:
      grid_h: 3
      grid_w: 3
      num_categories: 9
      tolerance: 0.80
