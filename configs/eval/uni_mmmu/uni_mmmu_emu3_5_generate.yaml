eval:
  benchmark: uni_mmmu

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/emu3_5/Emu3.5
    vq_path: ${UMM_MODEL_CACHE}/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: ${UMM_CODEBASE}/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400
  request:
    params:
      classifier_free_guidance: 2.0
      image_area: 518400
      max_new_tokens: 5120

uni_mmmu:
  data_root: ${UMM_DATASETS}/uni_mmmu/Uni-MMMU-Eval/data
  tasks: all
  out_dir: output/uni_mmmu/emu3_5
  max_samples: 0
  resume: true
  mode: generate  # generate | score | full
  score_output_path: output/uni_mmmu/emu3_5/overall_summary.json
  scoring:
    eval_dir: output/uni_mmmu/emu3_5/eval
    vl_model: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    text_lm_model: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B
    dreamsim_cache: ${UMM_MODEL_CACHE}/dreamsim
    max_retries: 2
    max_eval_items: 0  # 0 = all
    evaluate_images: true
    maze_parser:
      grid_h: 6
      grid_w: 6
      tolerance: 0.75
    sliding_parser:
      grid_h: 3
      grid_w: 3
      num_categories: 9
      tolerance: 0.80
