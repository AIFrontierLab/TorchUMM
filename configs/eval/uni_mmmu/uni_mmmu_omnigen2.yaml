eval:
  benchmark: uni_mmmu

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/omnigen2/OmniGen2
    omnigen2_root: ${UMM_CODEBASE}/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    output_dir_t2i: output/omnigen2_images
    output_dir_understanding: output/omnigen2_understanding
    output_dir_editing: output/omnigen2_editing
  request:
    params:
      max_new_tokens: 512
      num_inference_steps: 50
      text_guidance_scale: 4.0

uni_mmmu:
  data_root: ${UMM_DATASETS}/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [maze]
  out_dir: output/uni_mmmu/omnigen2
  max_samples: 0
  resume: true
  mode: full  # full | generate | score
  score_output_path: output/uni_mmmu/omnigen2/overall_summary.json
