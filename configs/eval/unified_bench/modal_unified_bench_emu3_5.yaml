eval:
  benchmark: unified_bench

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    vq_device: "cuda:0"
    classifier_free_guidance: 3.0
    max_new_tokens: 32768
    image_area: 518400
    seed: 6666

unified_bench:
  mode: generate
  ref_dir: /datasets/unified_bench/Image
  out_dir: /output-apr4/unified_bench/emu3_5
  resume: true
  max_samples: 0
  score_output_path: /output-apr4/unified_bench/emu3_5/summary.json

  captioning_instruction: |
    You are an expert vision-language model.
    Your task is: Given an input image, generate a **textual description** of the image. If there is text in the image, transcribe it inside double quotes "".
    Now, carefully analyze the input image and output the full description.

  scoring:
    models: [clip, dinov2, dinov3, longclip]
    model_paths:
      clip:     /model_cache/unified_bench/clip-vit-large-patch14
      dinov2:   /model_cache/unified_bench/dinov2-large
      dinov3:   /model_cache/unified_bench/dinov3-vitl16
      longclip: /model_cache/unified_bench/longclip-L.pt
    device: cuda

  score_model: unified_bench
  score_gpu: "A100-40GB:1"
