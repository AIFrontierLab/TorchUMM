eval:
  benchmark: unified_bench
inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: /model_cache/janus_pro/Janus-1.3B
    janus_root: /workspace/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      temperature: 1.0
      parallel_size: 4
      cfg_weight: 5.0
      image_token_num_per_image: 576
      img_size: 384
      patch_size: 16
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
      use_cache: true
unified_bench:
  mode: generate
  ref_dir: /datasets/unified_bench/Image
  out_dir: /output-apr4/unified_bench/janus
  resume: true
  max_samples: 0
  score_output_path: /output-apr4/unified_bench/janus/summary.json
  captioning_instruction: 'You are an expert vision-language model.

    Your task is: Given an input image, generate a **textual description** of the
    image. If there is text in the image, transcribe it inside double quotes "".

    Now, carefully analyze the input image and output the full description.

    '
  scoring:
    models:
    - clip
    - dinov2
    - dinov3
    - longclip
    model_paths:
      clip: /model_cache/unified_bench/clip-vit-large-patch14
      dinov2: /model_cache/unified_bench/dinov2-large
      dinov3: /model_cache/unified_bench/dinov3-vitl16
      longclip: /model_cache/unified_bench/longclip-L.pt
    device: cuda
  score_model: unified_bench
  score_gpu: A100-40GB:1
