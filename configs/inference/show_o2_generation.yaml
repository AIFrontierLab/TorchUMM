inference:
  backbone: show_o
  output_json: ${UMM_OUTPUTS}/show_o2_generation.json
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-7B
    show_o_root: ${UMM_CODEBASE}/model/show_o/Show-o
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg: {}
  request:
    task: generation
    # single prompt or list of prompts
    prompt: "A scenic landscape with mountains, a lake, and a colorful sunset."
    params:
      batch_size: 1
      guidance_scale: 3.0
      generation_timesteps: 50
      output_dir: ${UMM_OUTPUTS}/showo_generation_images
