# Default inference configuration
# Usage: python -m umm.cli.main infer --config configs/inference/default.yaml

inference:
  backbone: show_o
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/show_o/show-o-w-clip-vit-512x512
    show_o_root: ${UMM_CODEBASE}/model/show_o/Show-o
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 100
      top_k: 1
      temperature: 0.8
      use_clip_vit: true

  request:
    task: understanding
    prompt: "Please describe this image in detail."
    images:
      - ${UMM_OUTPUTS}/out.png

  output_json: output/inference_results.json
